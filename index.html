<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffe4ec" />
  <title>Madi and Hunter Chore Games!</title>

  <!-- Google Fonts: Bungee (display shout-lettering) + Fredoka (rounded body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bungee&family=Fredoka:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    /* =========================================================
       DESIGN TOKENS — shared with rps.html and coin.html
       ========================================================= */
    :root {
      --madi-1: #ff6bcb;
      --madi-2: #a855f7;
      --hunter-1: #3b82f6;
      --hunter-2: #14b8a6;

      --bg-1: #fff5e6;
      --bg-2: #ffe4ec;
      --bg-3: #e0f2fe;

      --ink: #1f1235;
      --ink-soft: #5a4a74;
      --paper: #ffffff;

      --gold: #fcd34d;
      --gold-glow: #fbbf24;

      --shadow-madi: 0 20px 40px -18px rgba(168, 85, 247, 0.55),
                     0 6px 12px -6px rgba(255, 107, 203, 0.35);
      --shadow-hunter: 0 20px 40px -18px rgba(59, 130, 246, 0.55),
                       0 6px 12px -6px rgba(20, 184, 166, 0.35);
      --shadow-card: 0 18px 40px -20px rgba(31, 18, 53, 0.35);

      --radius-lg: 28px;
      --radius-md: 18px;
      --radius-pill: 999px;

      --ease-pop: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-swift: cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* =========================================================
       RESET + BASE
       ========================================================= */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }

    body {
      font-family: 'Fredoka', system-ui, sans-serif;
      font-weight: 500;
      color: var(--ink);
      background:
        radial-gradient(1200px 700px at 10% 0%, var(--bg-2) 0%, transparent 60%),
        radial-gradient(1000px 600px at 100% 100%, var(--bg-3) 0%, transparent 55%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 60%, var(--bg-3) 100%);
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* Subtle noise texture overlay */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
      mix-blend-mode: multiply;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.12  0 0 0 0 0.08  0 0 0 0 0.20  0 0 0 0.05 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    }

    /* =========================================================
       LAYOUT
       ========================================================= */
    .app {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: clamp(24px, 5vw, 64px) clamp(16px, 4vw, 40px) 60px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      gap: clamp(24px, 4vw, 48px);
    }

    /* ---------- TITLE ---------- */
    .title-wrap {
      text-align: center;
      padding-top: 8px;
    }
    .title {
      font-family: 'Bungee', 'Fredoka', sans-serif;
      font-weight: 400;
      font-size: clamp(2rem, 7.5vw, 4.75rem);
      line-height: 1.02;
      letter-spacing: 0.005em;
      margin: 0;
      background: linear-gradient(90deg, var(--madi-1) 0%, var(--madi-2) 35%, var(--hunter-1) 65%, var(--hunter-2) 100%);
      -webkit-background-clip: text;
              background-clip: text;
      color: transparent;
      text-shadow: 0 6px 0 rgba(31, 18, 53, 0.08);
      animation: title-wiggle 4.2s ease-in-out infinite;
      transform-origin: center bottom;
      padding: 0 6px;
    }
    .subtitle {
      margin: 10px 0 0;
      font-size: clamp(1rem, 1.8vw, 1.25rem);
      color: var(--ink-soft);
      font-weight: 500;
    }
    @keyframes title-wiggle {
      0%, 100% { transform: rotate(-1.2deg) translateY(0); }
      50%      { transform: rotate(1.2deg) translateY(-4px); }
    }

    /* ---------- GAME CARDS GRID ---------- */
    .games {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(18px, 3vw, 32px);
    }

    .game-card {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: clamp(14px, 2vw, 20px);
      background: var(--paper);
      border-radius: var(--radius-lg);
      padding: clamp(22px, 3vw, 34px);
      min-height: clamp(280px, 36vw, 360px);
      text-decoration: none;
      color: inherit;
      opacity: 0;
      transform: translateY(18px) rotate(var(--tilt, 0deg));
      animation: card-in 720ms var(--ease-pop) var(--delay, 0ms) forwards;
      transition:
        transform 320ms var(--ease-pop),
        box-shadow 320ms var(--ease-swift);
      will-change: transform;
      cursor: pointer;
    }
    .game-card--rps {
      --tilt: -1.5deg;
      --delay: 120ms;
      --c1: var(--madi-1);
      --c2: var(--madi-2);
      box-shadow: var(--shadow-madi), var(--shadow-card);
    }
    .game-card--coin {
      --tilt: 1.5deg;
      --delay: 240ms;
      --c1: var(--hunter-1);
      --c2: var(--hunter-2);
      box-shadow: var(--shadow-hunter), var(--shadow-card);
    }

    .game-card::before {
      /* Color stripe, mirrors the player card pattern */
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 8px;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      background: linear-gradient(90deg, var(--c1), var(--c2));
    }

    .game-card:hover,
    .game-card:focus-visible {
      transform: translateY(-6px) rotate(var(--tilt, 0deg)) scale(1.015);
    }
    .game-card--rps:hover,
    .game-card--rps:focus-visible {
      box-shadow:
        0 30px 60px -20px rgba(168, 85, 247, 0.65),
        0 10px 20px -8px rgba(255, 107, 203, 0.45),
        var(--shadow-card);
    }
    .game-card--coin:hover,
    .game-card--coin:focus-visible {
      box-shadow:
        0 30px 60px -20px rgba(59, 130, 246, 0.65),
        0 10px 20px -8px rgba(20, 184, 166, 0.45),
        var(--shadow-card);
    }
    .game-card:focus-visible {
      outline: 3px solid var(--ink);
      outline-offset: 6px;
    }

    @keyframes card-in {
      0%   { opacity: 0; transform: translateY(28px) rotate(0deg) scale(0.94); }
      70%  { opacity: 1; transform: translateY(-4px) rotate(var(--tilt, 0deg)) scale(1.02); }
      100% { opacity: 1; transform: translateY(0)    rotate(var(--tilt, 0deg)) scale(1); }
    }

    .game-card__icon-stage {
      flex: 1 1 auto;
      min-height: clamp(120px, 18vw, 180px);
      display: grid;
      place-items: center;
      background:
        radial-gradient(60% 80% at 50% 40%, rgba(255,255,255,0.9) 0%, transparent 70%),
        linear-gradient(180deg, rgba(255,255,255,0.6), rgba(255,255,255,0.2));
      border-radius: var(--radius-md);
      border: 2px dashed rgba(31,18,53,0.08);
      padding: 20px;
      overflow: hidden;
    }

    /* RPS icon row: three wiggling hands */
    .rps-icons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(10px, 2vw, 18px);
      font-size: clamp(2.6rem, 7vw, 4rem);
      line-height: 1;
      filter: drop-shadow(0 10px 10px rgba(31,18,53,0.18));
      user-select: none;
    }
    .rps-icons span {
      display: inline-block;
      animation: hand-wiggle 2.4s ease-in-out infinite;
      transform-origin: center bottom;
    }
    .rps-icons span:nth-child(1) { animation-delay: 0ms;    }
    .rps-icons span:nth-child(2) { animation-delay: 260ms;  }
    .rps-icons span:nth-child(3) { animation-delay: 520ms;  }
    @keyframes hand-wiggle {
      0%, 100% { transform: translateY(0)    rotate(-6deg); }
      50%      { transform: translateY(-8px) rotate(8deg); }
    }

    /* Coin icon: slowly rotating coin emoji */
    .coin-icon {
      font-size: clamp(3.8rem, 9vw, 5.5rem);
      line-height: 1;
      filter: drop-shadow(0 12px 14px rgba(31,18,53,0.2));
      display: inline-block;
      animation: coin-spin 4.8s linear infinite;
      user-select: none;
    }
    @keyframes coin-spin {
      0%   { transform: rotateY(0deg); }
      100% { transform: rotateY(360deg); }
    }

    .game-card__body {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .game-card__name {
      font-family: 'Bungee', 'Fredoka', sans-serif;
      font-weight: 400;
      font-size: clamp(1.6rem, 3.4vw, 2.3rem);
      line-height: 1.02;
      margin: 0;
      background: linear-gradient(90deg, var(--c1), var(--c2));
      -webkit-background-clip: text;
              background-clip: text;
      color: transparent;
      letter-spacing: 0.01em;
    }
    .game-card__sub {
      margin: 0;
      font-size: clamp(0.95rem, 1.6vw, 1.1rem);
      color: var(--ink-soft);
      font-weight: 500;
    }

    .game-card__cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Bungee', sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      color: var(--paper);
      background: linear-gradient(135deg, var(--c1), var(--c2));
      padding: 12px 20px;
      border-radius: var(--radius-pill);
      align-self: flex-start;
      box-shadow: 0 10px 22px -10px rgba(0,0,0,0.3), inset 0 -4px 0 rgba(0,0,0,0.15);
      transition: transform 180ms var(--ease-pop);
    }
    .game-card__cta-arrow {
      transition: transform 180ms var(--ease-pop);
    }
    .game-card:hover .game-card__cta-arrow,
    .game-card:focus-visible .game-card__cta-arrow {
      transform: translateX(4px);
    }

    /* ---------- FOOTER ---------- */
    .site-footer {
      margin-top: auto;
      text-align: center;
      color: var(--ink-soft);
      font-size: 0.95rem;
      opacity: 0;
      animation: fade-in 800ms ease 520ms forwards;
    }
    @keyframes fade-in { to { opacity: 1; } }

    /* =========================================================
       RESPONSIVE
       ========================================================= */
    @media (max-width: 720px) {
      .games {
        grid-template-columns: 1fr;
      }
      .game-card { min-height: auto; }
      .game-card--rps  { --tilt: -0.8deg; }
      .game-card--coin { --tilt: 0.8deg; }
    }

    @media (prefers-reduced-motion: reduce) {
      .title,
      .rps-icons span,
      .coin-icon,
      .game-card { animation: none !important; }
      .game-card {
        opacity: 1;
        transform: rotate(var(--tilt, 0deg));
      }
      .site-footer { opacity: 1; }
    }
  </style>
</head>
<body>
  <main class="app" role="main">
    <header class="title-wrap">
      <h1 class="title">Madi and Hunter<br />Chore Games!</h1>
      <p class="subtitle">Pick a game to decide who does chores.</p>
    </header>

    <section class="games" aria-label="Choose a game">
      <!-- RPS CARD -->
      <a class="game-card game-card--rps" href="/rps.html" aria-label="Rock Paper Scissors — Best of 3, first to 2 wins">
        <div class="game-card__icon-stage" aria-hidden="true">
          <div class="rps-icons">
            <span>&#x270A;</span><span>&#x270B;</span><span>&#x270C;&#xFE0F;</span>
          </div>
        </div>
        <div class="game-card__body">
          <h2 class="game-card__name">Rock Paper Scissors</h2>
          <p class="game-card__sub">Best of 3 &mdash; first to 2 wins!</p>
        </div>
        <span class="game-card__cta">
          PLAY <span class="game-card__cta-arrow" aria-hidden="true">&rarr;</span>
        </span>
      </a>

      <!-- COIN FLIP CARD -->
      <a class="game-card game-card--coin" href="/coin.html" aria-label="Coin Flip — Best of 3 flips, heads or tails">
        <div class="game-card__icon-stage" aria-hidden="true">
          <span class="coin-icon">&#x1FA99;</span>
        </div>
        <div class="game-card__body">
          <h2 class="game-card__name">Coin Flip</h2>
          <p class="game-card__sub">Best of 3 flips &mdash; heads or tails!</p>
        </div>
        <span class="game-card__cta">
          PLAY <span class="game-card__cta-arrow" aria-hidden="true">&rarr;</span>
        </span>
      </a>
    </section>

    <footer class="site-footer">
      <span aria-hidden="true">&#x1F3B2;</span> Fair and random, always.
    </footer>
  </main>
</body>
</html>
