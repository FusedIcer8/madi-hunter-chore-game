<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffe4ec" />
  <title>Coin Flip! &mdash; Madi and Hunter Chore Games</title>

  <!-- Google Fonts: Bungee (display shout-lettering) + Fredoka (rounded body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bungee&family=Fredoka:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    /* =========================================================
       DESIGN TOKENS — shared with index.html and rps.html
       ========================================================= */
    :root {
      --madi-1: #ff6bcb;
      --madi-2: #a855f7;
      --hunter-1: #3b82f6;
      --hunter-2: #14b8a6;

      --bg-1: #fff5e6;
      --bg-2: #ffe4ec;
      --bg-3: #e0f2fe;

      --ink: #1f1235;
      --ink-soft: #5a4a74;
      --paper: #ffffff;

      --gold: #fcd34d;
      --gold-glow: #fbbf24;

      --shadow-madi: 0 20px 40px -18px rgba(168, 85, 247, 0.55),
                     0 6px 12px -6px rgba(255, 107, 203, 0.35);
      --shadow-hunter: 0 20px 40px -18px rgba(59, 130, 246, 0.55),
                       0 6px 12px -6px rgba(20, 184, 166, 0.35);
      --shadow-card: 0 18px 40px -20px rgba(31, 18, 53, 0.35);

      --radius-lg: 28px;
      --radius-md: 18px;
      --radius-pill: 999px;

      --ease-pop: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-swift: cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* =========================================================
       RESET + BASE
       ========================================================= */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
    button:focus-visible {
      outline: 3px solid var(--ink);
      outline-offset: 4px;
      border-radius: var(--radius-pill);
    }

    body {
      font-family: 'Fredoka', system-ui, sans-serif;
      font-weight: 500;
      color: var(--ink);
      background:
        radial-gradient(1200px 700px at 10% 0%, var(--bg-2) 0%, transparent 60%),
        radial-gradient(1000px 600px at 100% 100%, var(--bg-3) 0%, transparent 55%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 60%, var(--bg-3) 100%);
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
      mix-blend-mode: multiply;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.12  0 0 0 0 0.08  0 0 0 0 0.20  0 0 0 0.05 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    }

    /* ---------- BACK TO MENU PILL LINK ---------- */
    .back-link {
      position: relative;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: clamp(14px, 2.5vw, 22px) 0 0 clamp(16px, 4vw, 40px);
      padding: 10px 18px;
      font-family: 'Fredoka', system-ui, sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--ink-soft);
      background: var(--paper);
      border-radius: var(--radius-pill);
      text-decoration: none;
      box-shadow: 0 6px 16px -8px rgba(31, 18, 53, 0.25);
      transition: transform 180ms var(--ease-pop), box-shadow 180ms ease, color 180ms ease;
      width: max-content;
    }
    .back-link:hover {
      transform: translateY(-2px);
      color: var(--ink);
      box-shadow: 0 10px 22px -8px rgba(31, 18, 53, 0.32);
    }
    .back-link:focus-visible {
      outline: 3px solid var(--ink);
      outline-offset: 4px;
    }
    .back-link__arrow {
      font-family: 'Bungee', sans-serif;
      transition: transform 180ms var(--ease-pop);
    }
    .back-link:hover .back-link__arrow { transform: translateX(-3px); }

    /* =========================================================
       LAYOUT
       ========================================================= */
    .app {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: clamp(20px, 4vw, 48px) clamp(16px, 4vw, 40px) 60px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      gap: clamp(20px, 3.5vw, 36px);
    }

    /* ---------- TITLE ---------- */
    .title-wrap {
      text-align: center;
      padding-top: 8px;
    }
    .title {
      font-family: 'Bungee', 'Fredoka', sans-serif;
      font-weight: 400;
      font-size: clamp(2rem, 7.5vw, 4.75rem);
      line-height: 1.02;
      letter-spacing: 0.005em;
      margin: 0;
      background: linear-gradient(90deg, var(--madi-1) 0%, var(--madi-2) 35%, var(--hunter-1) 65%, var(--hunter-2) 100%);
      -webkit-background-clip: text;
              background-clip: text;
      color: transparent;
      text-shadow: 0 6px 0 rgba(31, 18, 53, 0.08);
      animation: title-entry 700ms var(--ease-pop) both, title-wiggle 4.2s ease-in-out 700ms infinite;
      transform-origin: center bottom;
      padding: 0 6px;
    }
    .subtitle {
      margin: 8px 0 0;
      font-size: clamp(0.95rem, 1.6vw, 1.15rem);
      color: var(--ink-soft);
      font-weight: 500;
    }
    @keyframes title-entry {
      0%   { transform: scale(0.6) rotate(-4deg); opacity: 0; }
      70%  { transform: scale(1.08) rotate(1.5deg); opacity: 1; }
      100% { transform: scale(1) rotate(-1.2deg); opacity: 1; }
    }
    @keyframes title-wiggle {
      0%, 100% { transform: rotate(-1.2deg) translateY(0); }
      50%      { transform: rotate(1.2deg) translateY(-4px); }
    }

    /* ---------- ASSIGNMENT CHIPS (Madi = HEADS / Hunter = TAILS) ---------- */
    .assignment {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: clamp(10px, 2vw, 18px);
      flex-wrap: wrap;
    }
    .assignment__chip {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      border-radius: var(--radius-pill);
      background: var(--paper);
      box-shadow: 0 10px 22px -12px rgba(31, 18, 53, 0.35);
      font-family: 'Fredoka', sans-serif;
      font-weight: 600;
      font-size: clamp(0.95rem, 1.6vw, 1.1rem);
      color: var(--ink);
      border-top: 4px solid var(--c1);
    }
    .assignment__chip--madi   { --c1: var(--madi-1);   --c2: var(--madi-2); }
    .assignment__chip--hunter { --c1: var(--hunter-1); --c2: var(--hunter-2); }
    .assignment__chip strong {
      font-family: 'Bungee', sans-serif;
      letter-spacing: 0.06em;
      background: linear-gradient(90deg, var(--c1), var(--c2));
      -webkit-background-clip: text;
              background-clip: text;
      color: transparent;
    }
    .assignment__dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--ink-soft);
      opacity: 0.5;
    }

    /* ---------- PLAYER CARDS + ARENA ---------- */
    .board {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: stretch;
      gap: clamp(12px, 2.5vw, 28px);
    }

    .player {
      position: relative;
      background: var(--paper);
      border-radius: var(--radius-lg);
      padding: clamp(18px, 2.4vw, 26px);
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: transform 300ms var(--ease-pop), box-shadow 300ms var(--ease-swift);
    }
    .player--madi   { transform: rotate(-1.2deg); box-shadow: var(--shadow-madi), var(--shadow-card); }
    .player--hunter { transform: rotate(1.2deg);  box-shadow: var(--shadow-hunter), var(--shadow-card); }
    .player--madi.is-winning-round   { transform: rotate(-1.2deg) translateY(-4px) scale(1.02); }
    .player--hunter.is-winning-round { transform: rotate(1.2deg)  translateY(-4px) scale(1.02); }

    .player::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 8px;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      background: linear-gradient(90deg, var(--c1), var(--c2));
    }
    .player--madi   { --c1: var(--madi-1);   --c2: var(--madi-2); }
    .player--hunter { --c1: var(--hunter-1); --c2: var(--hunter-2); }

    .player__header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 6px;
    }
    .player__avatar {
      width: clamp(54px, 8vw, 72px);
      height: clamp(54px, 8vw, 72px);
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: clamp(2rem, 4.5vw, 2.6rem);
      background: linear-gradient(135deg, var(--c1), var(--c2));
      box-shadow: 0 10px 20px -10px rgba(0,0,0,0.25), inset 0 -4px 0 rgba(0,0,0,0.12);
      flex: 0 0 auto;
    }
    .player__name {
      font-family: 'Bungee', 'Fredoka', sans-serif;
      font-size: clamp(1.4rem, 3vw, 2rem);
      line-height: 1;
      background: linear-gradient(90deg, var(--c1), var(--c2));
      -webkit-background-clip: text;
              background-clip: text;
      color: transparent;
    }
    .player__side {
      font-family: 'Bungee', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.16em;
      color: var(--ink-soft);
      margin-top: 2px;
    }

    .player__scorerow {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
    }
    .player__scorelabel {
      font-size: 0.85rem;
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 600;
    }
    .pips {
      display: flex;
      gap: 10px;
      margin-left: auto;
    }
    .pip {
      width: clamp(22px, 3.2vw, 28px);
      height: clamp(22px, 3.2vw, 28px);
      border-radius: 50%;
      background: #f3eef8;
      box-shadow: inset 0 2px 4px rgba(31,18,53,0.14);
      position: relative;
      transition: transform 300ms var(--ease-pop);
    }
    .pip.is-filled {
      background: linear-gradient(135deg, var(--c1), var(--c2));
      box-shadow: 0 6px 14px -4px rgba(0,0,0,0.25), inset 0 -3px 0 rgba(0,0,0,0.15);
      animation: pip-pop 600ms var(--ease-pop);
    }
    .pip.is-filled::after {
      content: "✦";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 0.85rem;
      opacity: 0;
      animation: sparkle 900ms var(--ease-swift) forwards;
    }
    @keyframes pip-pop {
      0%   { transform: scale(0.3); }
      60%  { transform: scale(1.35); }
      100% { transform: scale(1); }
    }
    @keyframes sparkle {
      0%   { opacity: 0; transform: scale(0.4) rotate(-40deg); }
      40%  { opacity: 1; transform: scale(1.2) rotate(10deg); }
      100% { opacity: 0.85; transform: scale(1) rotate(0); }
    }

    /* ---------- BADGE STAGE (inside each player card) ---------- */
    .badge-stage {
      margin-top: auto;
      height: clamp(110px, 16vw, 150px);
      display: grid;
      place-items: center;
      background:
        radial-gradient(60% 80% at 50% 40%, rgba(255,255,255,0.9) 0%, transparent 70%),
        linear-gradient(180deg, rgba(255,255,255,0.6), rgba(255,255,255,0.2));
      border-radius: var(--radius-md);
      border: 2px dashed rgba(31,18,53,0.08);
      overflow: hidden;
      position: relative;
    }
    .badge {
      font-size: clamp(3.2rem, 8vw, 4.4rem);
      line-height: 1;
      filter: drop-shadow(0 10px 10px rgba(31,18,53,0.18));
      transition: transform 300ms var(--ease-pop), filter 300ms var(--ease-swift), opacity 300ms ease;
      user-select: none;
    }
    .badge-label {
      position: absolute;
      bottom: 10px;
      font-family: 'Bungee', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.16em;
      color: var(--ink-soft);
    }
    .badge.is-winner {
      transform: scale(1.2);
      filter: drop-shadow(0 0 22px var(--gold-glow)) drop-shadow(0 0 8px var(--gold));
      animation: winner-pulse 900ms var(--ease-pop);
    }
    .badge.is-loser {
      transform: scale(0.82);
      filter: grayscale(60%) brightness(0.92);
      opacity: 0.7;
    }
    @keyframes winner-pulse {
      0%   { transform: scale(0.9); }
      50%  { transform: scale(1.35); }
      100% { transform: scale(1.2); }
    }

    /* ---------- CENTER ARENA (coin + round indicator) ---------- */
    .arena {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: clamp(180px, 22vw, 260px);
      gap: 16px;
      padding: 10px 6px;
    }

    .round-indicator {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--ink-soft);
      font-weight: 600;
      text-align: center;
    }
    .round-indicator strong {
      display: block;
      font-family: 'Bungee', sans-serif;
      font-size: clamp(1.1rem, 2.2vw, 1.4rem);
      color: var(--ink);
      letter-spacing: 0.04em;
      margin-top: 2px;
    }

    /* ---------- COIN (CSS 3D flip) ---------- */
    .coin-scene {
      width: clamp(150px, 20vw, 220px);
      height: clamp(150px, 20vw, 220px);
      perspective: 900px;
      position: relative;
    }
    .coin-scene::before {
      /* Shadow pad under the coin */
      content: "";
      position: absolute;
      left: 50%; bottom: -14px;
      transform: translateX(-50%);
      width: 70%;
      height: 18px;
      background: radial-gradient(ellipse at center, rgba(31,18,53,0.35), transparent 70%);
      filter: blur(4px);
      opacity: 0.7;
      transition: transform 300ms var(--ease-swift), opacity 300ms ease;
    }
    .coin-scene.is-spinning::before {
      transform: translateX(-50%) scale(0.85, 0.7);
      opacity: 0.5;
    }

    .coin {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transform: rotateX(0deg);
      transition: transform 180ms ease;
    }
    /* Spin animation: 6 full rotations over ~1.2s with ease-out */
    .coin.is-spinning {
      animation: coin-flip 1200ms cubic-bezier(0.17, 0.67, 0.32, 1.0) forwards;
    }
    /* Result rotations are applied inline; these end states are referenced for reduced motion */
    .coin.is-heads { transform: rotateX(0deg); }
    .coin.is-tails { transform: rotateX(180deg); }

    @keyframes coin-flip {
      /* Caller sets --spin-end to either 0deg (heads) or 180deg (tails).
         6 full rotations before landing = 2160deg + end. */
      0%   { transform: rotateX(0deg); }
      100% { transform: rotateX(calc(2160deg + var(--spin-end, 0deg))); }
    }

    .coin__face {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      display: grid;
      place-items: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      box-shadow:
        inset 0 0 0 6px rgba(255,255,255,0.35),
        inset 0 -12px 24px rgba(0,0,0,0.25),
        0 18px 32px -12px rgba(31,18,53,0.45);
      font-family: 'Bungee', sans-serif;
      font-size: clamp(3.2rem, 7vw, 5rem);
      color: var(--paper);
      letter-spacing: 0.02em;
      text-shadow:
        0 4px 0 rgba(0,0,0,0.25),
        0 2px 6px rgba(0,0,0,0.2);
    }
    .coin__face--heads {
      background: radial-gradient(circle at 30% 25%, #ffdcf2 0%, transparent 45%),
                  linear-gradient(135deg, var(--madi-1), var(--madi-2));
      transform: rotateX(0deg);
    }
    .coin__face--tails {
      background: radial-gradient(circle at 30% 25%, #dbeafe 0%, transparent 45%),
                  linear-gradient(135deg, var(--hunter-1), var(--hunter-2));
      transform: rotateX(180deg);
    }

    /* ---------- FLIP RESULT OVERLAY ---------- */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      pointer-events: none;
      background: radial-gradient(circle at 50% 50%, rgba(31,18,53,0.18), transparent 60%);
      opacity: 0;
      transition: opacity 220ms ease;
    }
    .overlay.is-visible { opacity: 1; }
    .overlay__text {
      font-family: 'Bungee', sans-serif;
      font-size: clamp(2.8rem, 12vw, 8rem);
      line-height: 1;
      text-align: center;
      padding: 0 20px;
      color: var(--ink);
      text-shadow:
        6px 6px 0 var(--gold),
        12px 12px 0 rgba(31,18,53,0.15);
      animation: countdown-pulse 550ms var(--ease-pop);
      letter-spacing: 0.02em;
    }
    .overlay__text--heads {
      background: linear-gradient(90deg, var(--madi-1), var(--madi-2));
      -webkit-background-clip: text;
              background-clip: text;
      color: transparent;
      text-shadow: 6px 6px 0 rgba(31,18,53,0.2);
    }
    .overlay__text--tails {
      background: linear-gradient(90deg, var(--hunter-1), var(--hunter-2));
      -webkit-background-clip: text;
              background-clip: text;
      color: transparent;
      text-shadow: 6px 6px 0 rgba(31,18,53,0.2);
    }
    @keyframes countdown-pulse {
      0%   { transform: scale(0.6); opacity: 0; }
      40%  { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ---------- WINNER BANNER ---------- */
    .winner-banner {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: grid;
      place-items: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 300ms ease;
      padding: 20px;
    }
    .winner-banner.is-visible { opacity: 1; }
    .winner-banner__card {
      background: var(--paper);
      border-radius: var(--radius-lg);
      padding: clamp(24px, 4vw, 44px) clamp(28px, 5vw, 60px);
      text-align: center;
      box-shadow: 0 40px 80px -30px rgba(31,18,53,0.4);
      transform: scale(0.7) rotate(-3deg);
      transition: transform 600ms var(--ease-pop);
      max-width: min(90vw, 640px);
      border-top: 12px solid var(--winner-c1, var(--gold));
    }
    .winner-banner.is-visible .winner-banner__card {
      transform: scale(1) rotate(-1deg);
    }
    .winner-banner__headline {
      font-family: 'Bungee', sans-serif;
      font-size: clamp(2.2rem, 7vw, 4.5rem);
      line-height: 1;
      margin: 0 0 10px;
      background: linear-gradient(90deg, var(--winner-c1, var(--madi-1)), var(--winner-c2, var(--madi-2)));
      -webkit-background-clip: text;
              background-clip: text;
      color: transparent;
      letter-spacing: 0.02em;
    }
    .winner-banner__chore {
      font-size: clamp(1.1rem, 2.4vw, 1.5rem);
      color: var(--ink);
      margin: 8px 0 0;
      font-weight: 600;
    }
    .winner-banner__chore .emoji {
      display: inline-block;
      margin-left: 6px;
      animation: broom-sweep 1.8s ease-in-out infinite;
      transform-origin: 70% 70%;
    }
    @keyframes broom-sweep {
      0%, 100% { transform: rotate(-14deg); }
      50%      { transform: rotate(14deg); }
    }

    /* ---------- PLAY BUTTON (same style as rps.html) ---------- */
    .play-wrap {
      display: grid;
      place-items: center;
      margin-top: clamp(12px, 2vw, 24px);
    }
    .play-btn {
      font-family: 'Bungee', sans-serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      padding: clamp(18px, 2.4vw, 24px) clamp(40px, 7vw, 68px);
      color: var(--paper);
      background: linear-gradient(135deg, var(--hunter-1) 0%, var(--hunter-2) 50%, var(--madi-1) 100%);
      border-radius: var(--radius-pill);
      box-shadow:
        0 18px 36px -10px rgba(59,130,246,0.55),
        0 6px 0 rgba(31,18,53,0.2),
        inset 0 -6px 0 rgba(0,0,0,0.15);
      letter-spacing: 0.06em;
      transform: translateY(0);
      transition: transform 180ms var(--ease-pop), box-shadow 180ms ease, filter 180ms ease;
      min-height: 56px;
      min-width: 180px;
      position: relative;
    }
    .play-btn:not(:disabled):hover { transform: translateY(-3px) scale(1.02); }
    .play-btn:not(:disabled):active { transform: translateY(2px) scale(0.99); }
    .play-btn:disabled {
      filter: saturate(0.5) brightness(0.95);
      cursor: not-allowed;
      opacity: 0.75;
    }
    .play-btn__pulse {
      position: absolute;
      inset: 0;
      border-radius: var(--radius-pill);
      box-shadow: 0 0 0 0 rgba(59,130,246,0.55);
      animation: btn-pulse 2.2s ease-out infinite;
      pointer-events: none;
    }
    .play-btn:disabled .play-btn__pulse { animation: none; box-shadow: none; }
    @keyframes btn-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(59,130,246,0.5); }
      70%  { box-shadow: 0 0 0 24px rgba(59,130,246,0); }
      100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); }
    }

    /* ---------- CONFETTI CANVAS ---------- */
    #confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 55;
    }

    /* ---------- ACCESSIBILITY ---------- */
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }
    .hint {
      text-align: center;
      color: var(--ink-soft);
      font-size: 0.9rem;
      margin-top: 8px;
    }

    /* =========================================================
       RESPONSIVE
       ========================================================= */
    @media (max-width: 720px) {
      .board {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
      }
      .arena {
        order: 2;
        padding: 4px;
        min-width: 0;
      }
      .player--madi   { order: 1; transform: rotate(-0.6deg); }
      .player--hunter { order: 3; transform: rotate(0.6deg); }
      .player--madi.is-winning-round   { transform: rotate(-0.6deg) translateY(-3px) scale(1.01); }
      .player--hunter.is-winning-round { transform: rotate(0.6deg)  translateY(-3px) scale(1.01); }
    }

    /* Reduced motion: disable decorative animations & flip spin */
    @media (prefers-reduced-motion: reduce) {
      .title,
      .winner-banner__chore .emoji,
      .play-btn__pulse { animation: none !important; }
      .pip.is-filled,
      .overlay__text { animation-duration: 0.01ms !important; }
      .coin.is-spinning { animation: none !important; }
    }
  </style>
</head>
<body>
  <!-- Back to menu link -->
  <a class="back-link" href="/" aria-label="Back to games menu">
    <span class="back-link__arrow" aria-hidden="true">&larr;</span>
    <span>Back to Games</span>
  </a>

  <main class="app" role="main">
    <!-- TITLE -->
    <header class="title-wrap">
      <h1 class="title" aria-label="Coin Flip!">Coin Flip!</h1>
      <p class="subtitle">Best of 3 flips &mdash; heads or tails decide the chores!</p>
    </header>

    <!-- ASSIGNMENT -->
    <div class="assignment" aria-label="Side assignments">
      <span class="assignment__chip assignment__chip--madi">
        <span aria-hidden="true">&#x1F451;</span> Madi = <strong>HEADS</strong>
      </span>
      <span class="assignment__dot" aria-hidden="true"></span>
      <span class="assignment__chip assignment__chip--hunter">
        <span aria-hidden="true">&#x2B50;</span> Hunter = <strong>TAILS</strong>
      </span>
    </div>

    <!-- BOARD: Madi card | Coin | Hunter card -->
    <section class="board" aria-label="Match board">
      <!-- MADI -->
      <article class="player player--madi" id="card-madi" aria-labelledby="madi-name">
        <header class="player__header">
          <div class="player__avatar" aria-hidden="true">&#x1F467;</div>
          <div>
            <h2 class="player__name" id="madi-name">Madi</h2>
            <div class="player__side">HEADS &#x1F451;</div>
          </div>
        </header>
        <div class="player__scorerow">
          <span class="player__scorelabel">Score</span>
          <div class="pips" role="status" aria-label="Madi's wins">
            <div class="pip" data-player="madi" data-index="0"></div>
            <div class="pip" data-player="madi" data-index="1"></div>
          </div>
        </div>
        <div class="badge-stage">
          <div class="badge" id="badge-madi" aria-hidden="true">&#x1F451;</div>
          <div class="badge-label">HEADS</div>
        </div>
      </article>

      <!-- ARENA (coin) -->
      <div class="arena" aria-hidden="true">
        <div class="coin-scene" id="coinScene">
          <div class="coin" id="coin">
            <div class="coin__face coin__face--heads">H</div>
            <div class="coin__face coin__face--tails">T</div>
          </div>
        </div>
        <div class="round-indicator">
          Flip
          <strong id="round-number">1</strong>
        </div>
      </div>

      <!-- HUNTER -->
      <article class="player player--hunter" id="card-hunter" aria-labelledby="hunter-name">
        <header class="player__header">
          <div class="player__avatar" aria-hidden="true">&#x1F466;</div>
          <div>
            <h2 class="player__name" id="hunter-name">Hunter</h2>
            <div class="player__side">TAILS &#x2B50;</div>
          </div>
        </header>
        <div class="player__scorerow">
          <span class="player__scorelabel">Score</span>
          <div class="pips" role="status" aria-label="Hunter's wins">
            <div class="pip" data-player="hunter" data-index="0"></div>
            <div class="pip" data-player="hunter" data-index="1"></div>
          </div>
        </div>
        <div class="badge-stage">
          <div class="badge" id="badge-hunter" aria-hidden="true">&#x2B50;</div>
          <div class="badge-label">TAILS</div>
        </div>
      </article>
    </section>

    <!-- FLIP BUTTON -->
    <div class="play-wrap">
      <button id="playBtn" class="play-btn" type="button" aria-label="Flip the coin">
        <span class="play-btn__pulse" aria-hidden="true"></span>
        <span id="playBtnLabel">FLIP!</span>
      </button>
    </div>
    <p class="hint">Press Enter or Space on the button to flip.</p>

    <!-- Live region for screen readers -->
    <div id="announcer" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>
  </main>

  <!-- Flip result overlay -->
  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="overlay__text" id="overlayText">HEADS!</div>
  </div>

  <!-- Winner banner -->
  <div class="winner-banner" id="winnerBanner" aria-hidden="true">
    <div class="winner-banner__card" id="winnerCard">
      <h2 class="winner-banner__headline" id="winnerHeadline">MADI WINS!</h2>
      <p class="winner-banner__chore" id="winnerChore">
        Hunter does the chores! <span class="emoji" aria-hidden="true">&#x1F9F9;</span>
      </p>
    </div>
  </div>

  <!-- Confetti canvas -->
  <canvas id="confetti" aria-hidden="true"></canvas>

  <script>
  // =========================================================
  // CONSTANTS
  // =========================================================
  const WINS_TO_END      = 2;      // Best of 3 = first to 2
  const SPIN_DURATION_MS = 1200;   // Coin spin (matches CSS animation length)
  const POST_FLIP_PAUSE  = 900;    // Pause after landing before next flip
  const NEXT_FLIP_PAUSE  = 650;    // Pause between flips for breathing room
  const CONFETTI_DURATION = 3000;

  const PLAYERS = {
    madi:   { name: 'Madi',   color1: '#ff6bcb', color2: '#a855f7', side: 'heads', label: 'HEADS' },
    hunter: { name: 'Hunter', color1: '#3b82f6', color2: '#14b8a6', side: 'tails', label: 'TAILS' }
  };

  // Heads → Madi wins, Tails → Hunter wins. Hard mapping (no ties possible).
  const SIDE_TO_WINNER = { heads: 'madi', tails: 'hunter' };

  // =========================================================
  // STATE MACHINE
  // States: IDLE → SPINNING → LANDED → SCORE → (NEXT_FLIP | MATCH_END) → IDLE
  // =========================================================
  const state = {
    phase: 'IDLE',
    scores: { madi: 0, hunter: 0 },
    round: 1,
    busy: false,
    // Track the coin's current landed side so each new spin starts from the
    // correct orientation (purely cosmetic — result is independent).
    currentSide: 'heads'
  };

  // =========================================================
  // DOM REFS
  // =========================================================
  const els = {
    playBtn:        document.getElementById('playBtn'),
    playBtnLabel:   document.getElementById('playBtnLabel'),
    badgeMadi:      document.getElementById('badge-madi'),
    badgeHunter:    document.getElementById('badge-hunter'),
    cardMadi:       document.getElementById('card-madi'),
    cardHunter:     document.getElementById('card-hunter'),
    roundNumber:    document.getElementById('round-number'),
    coinScene:      document.getElementById('coinScene'),
    coin:           document.getElementById('coin'),
    overlay:        document.getElementById('overlay'),
    overlayText:    document.getElementById('overlayText'),
    winnerBanner:   document.getElementById('winnerBanner'),
    winnerCard:     document.getElementById('winnerCard'),
    winnerHeadline: document.getElementById('winnerHeadline'),
    winnerChore:    document.getElementById('winnerChore'),
    announcer:      document.getElementById('announcer'),
    canvas:         document.getElementById('confetti')
  };
  const pips = Array.from(document.querySelectorAll('.pip'));

  const prefersReducedMotion =
    window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // =========================================================
  // UTIL
  // =========================================================
  const sleep = (ms) => new Promise(r => setTimeout(r, ms));
  const announce = (msg) => { els.announcer.textContent = msg; };

  // =========================================================
  // RNG / GAME LOGIC  (fairness critical — no rigging)
  // Per flip:
  //   - Call Math.random() ONCE.
  //   - r < 0.5 → 'heads' (Madi scores). Otherwise → 'tails' (Hunter scores).
  //   - Independent draw every flip; no patterns, no bias. Ties are impossible.
  // =========================================================
  function flipCoin() {
    const r = Math.random();        // Fresh independent draw
    return r < 0.5 ? 'heads' : 'tails';
  }

  // =========================================================
  // RENDER
  // =========================================================
  function renderScores() {
    pips.forEach(pip => {
      const who = pip.dataset.player;
      const idx = Number(pip.dataset.index);
      const filled = state.scores[who] > idx;
      if (filled && !pip.classList.contains('is-filled')) {
        pip.classList.add('is-filled');
      } else if (!filled && pip.classList.contains('is-filled')) {
        pip.classList.remove('is-filled');
      }
    });
  }

  function renderRound() {
    els.roundNumber.textContent = String(state.round);
  }

  function resetBadgesVisual() {
    [els.badgeMadi, els.badgeHunter].forEach(b => {
      b.classList.remove('is-winner', 'is-loser');
    });
    [els.cardMadi, els.cardHunter].forEach(c => c.classList.remove('is-winning-round'));
  }

  // =========================================================
  // COIN ANIMATION
  // =========================================================
  /**
   * Spins the coin and lands on the requested side.
   * Visual-only — the result was already decided by flipCoin().
   * Uses a single @keyframes that rotates by (6 full turns + end offset).
   * Respects prefers-reduced-motion: skips the spin and just snaps.
   */
  async function animateCoinTo(side) {
    const endDeg = side === 'heads' ? 0 : 180;

    if (prefersReducedMotion) {
      els.coin.style.transform = `rotateX(${endDeg}deg)`;
      state.currentSide = side;
      return;
    }

    // Remove any prior spin class + inline transform to start fresh from
    // the current landed side (0deg for heads, 180deg for tails).
    els.coin.classList.remove('is-spinning');
    els.coin.style.transform = state.currentSide === 'heads' ? 'rotateX(0deg)' : 'rotateX(180deg)';
    // Force reflow so the animation can restart cleanly
    void els.coin.offsetWidth;

    // Set the end offset the @keyframes reads (0deg or 180deg).
    els.coin.style.setProperty('--spin-end', endDeg + 'deg');
    els.coinScene.classList.add('is-spinning');
    els.coin.classList.add('is-spinning');

    await sleep(SPIN_DURATION_MS);

    // Pin the final orientation so subsequent spins start from here.
    els.coin.classList.remove('is-spinning');
    els.coinScene.classList.remove('is-spinning');
    els.coin.style.transform = `rotateX(${endDeg}deg)`;
    state.currentSide = side;
  }

  // =========================================================
  // OVERLAY / RESULT FLASH
  // =========================================================
  function showOverlay(text, variant) {
    els.overlayText.className = 'overlay__text' + (variant ? ' overlay__text--' + variant : '');
    els.overlayText.textContent = text;
    els.overlayText.style.animation = 'none';
    void els.overlayText.offsetWidth;
    els.overlayText.style.animation = '';
    els.overlay.classList.add('is-visible');
    els.overlay.setAttribute('aria-hidden', 'false');
  }
  function hideOverlay() {
    els.overlay.classList.remove('is-visible');
    els.overlay.setAttribute('aria-hidden', 'true');
  }

  // =========================================================
  // CONFETTI (shared pattern with rps.html)
  // =========================================================
  const confettiCtx = els.canvas.getContext('2d');
  let confettiRAF = null;
  let confettiPieces = [];

  function sizeCanvas() {
    els.canvas.width  = window.innerWidth  * devicePixelRatio;
    els.canvas.height = window.innerHeight * devicePixelRatio;
    els.canvas.style.width  = window.innerWidth  + 'px';
    els.canvas.style.height = window.innerHeight + 'px';
    confettiCtx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }
  window.addEventListener('resize', sizeCanvas);

  function launchConfetti(primaryColors) {
    sizeCanvas();
    const palette = primaryColors.concat(['#fcd34d', '#ffffff', '#1f1235']);
    const w = window.innerWidth;
    confettiPieces = [];
    for (let i = 0; i < 150; i++) {
      confettiPieces.push({
        x: Math.random() * w,
        y: -20 - Math.random() * 200,
        vx: (Math.random() - 0.5) * 2.2,
        vy: 2 + Math.random() * 4,
        size: 6 + Math.random() * 8,
        rot: Math.random() * Math.PI * 2,
        vr: (Math.random() - 0.5) * 0.25,
        color: palette[Math.floor(Math.random() * palette.length)]
      });
    }
    const startTs = performance.now();
    cancelAnimationFrame(confettiRAF);

    function frame(now) {
      const elapsed = now - startTs;
      const h = window.innerHeight;
      confettiCtx.clearRect(0, 0, window.innerWidth, h);
      const fading = elapsed > CONFETTI_DURATION - 600;
      const alpha = fading ? Math.max(0, 1 - (elapsed - (CONFETTI_DURATION - 600)) / 600) : 1;
      confettiCtx.globalAlpha = alpha;

      confettiPieces.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.06;
        p.rot += p.vr;
        confettiCtx.save();
        confettiCtx.translate(p.x, p.y);
        confettiCtx.rotate(p.rot);
        confettiCtx.fillStyle = p.color;
        confettiCtx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
        confettiCtx.restore();
      });
      confettiCtx.globalAlpha = 1;

      if (elapsed < CONFETTI_DURATION) {
        confettiRAF = requestAnimationFrame(frame);
      } else {
        confettiCtx.clearRect(0, 0, window.innerWidth, h);
      }
    }
    confettiRAF = requestAnimationFrame(frame);
  }

  // =========================================================
  // EVENT HANDLERS
  // =========================================================
  async function onPlayClick() {
    if (state.busy) return;
    await runMatch();
  }

  // =========================================================
  // MATCH FLOW (state machine)
  // IDLE → [loop] SPINNING → LANDED → SCORE → (NEXT_FLIP | MATCH_END) → IDLE
  // =========================================================
  async function runMatch() {
    // --- Reset for a new match ---
    state.busy = true;
    state.scores = { madi: 0, hunter: 0 };
    state.round = 1;
    els.playBtn.disabled = true;
    els.playBtn.setAttribute('aria-busy', 'true');
    hideWinnerBanner();
    renderScores();
    renderRound();
    resetBadgesVisual();

    // --- Play flips until someone reaches WINS_TO_END ---
    // Coin flip cannot tie; every flip is decisive.
    while (state.scores.madi < WINS_TO_END && state.scores.hunter < WINS_TO_END) {
      await playOneFlip();
      if (state.scores.madi < WINS_TO_END && state.scores.hunter < WINS_TO_END) {
        state.round += 1;
        renderRound();
        await sleep(NEXT_FLIP_PAUSE);
      }
    }

    // --- Match end ---
    const winner = state.scores.madi >= WINS_TO_END ? 'madi' : 'hunter';
    const loser  = winner === 'madi' ? 'hunter' : 'madi';
    await showMatchEnd(winner, loser);

    // --- Re-enable button ---
    els.playBtn.disabled = false;
    els.playBtn.removeAttribute('aria-busy');
    els.playBtnLabel.textContent = 'Flip Again!';
    state.busy = false;
    state.phase = 'IDLE';
  }

  async function playOneFlip() {
    state.phase = 'SPINNING';
    resetBadgesVisual();

    // --- Decide result FIRST (independent RNG per flip) ---
    const side = flipCoin();                   // 'heads' | 'tails'
    const winner = SIDE_TO_WINNER[side];       // 'madi'  | 'hunter'
    const loser  = winner === 'madi' ? 'hunter' : 'madi';

    // --- Spin the coin to the predetermined result ---
    announce(`Flip ${state.round}: flipping...`);
    await animateCoinTo(side);

    // --- Landed: flash the overlay & mark state ---
    state.phase = 'LANDED';
    const label = side === 'heads' ? 'HEADS!' : 'TAILS!';
    showOverlay(label, side);
    await sleep(500);
    hideOverlay();

    // --- Score: highlight winner/loser, award point ---
    state.phase = 'SCORE';
    (winner === 'madi' ? els.badgeMadi : els.badgeHunter).classList.add('is-winner');
    (loser  === 'madi' ? els.badgeMadi : els.badgeHunter).classList.add('is-loser');
    (winner === 'madi' ? els.cardMadi  : els.cardHunter).classList.add('is-winning-round');

    state.scores[winner] += 1;
    renderScores();

    announce(
      `Flip ${state.round}: ${label.replace('!', '')}. ` +
      `${PLAYERS[winner].name} wins this flip. ` +
      `Score: Madi ${state.scores.madi}, Hunter ${state.scores.hunter}.`
    );

    await sleep(POST_FLIP_PAUSE);
  }

  async function showMatchEnd(winner, loser) {
    state.phase = 'MATCH_END';
    const wP = PLAYERS[winner];
    const lP = PLAYERS[loser];

    els.winnerHeadline.textContent = `${wP.name.toUpperCase()} WINS!`;
    els.winnerChore.innerHTML =
      `${lP.name} does the chores! <span class="emoji" aria-hidden="true">\uD83E\uDDF9</span>`;
    els.winnerCard.style.setProperty('--winner-c1', wP.color1);
    els.winnerCard.style.setProperty('--winner-c2', wP.color2);
    els.winnerCard.style.borderTopColor = wP.color1;

    els.winnerBanner.classList.add('is-visible');
    els.winnerBanner.setAttribute('aria-hidden', 'false');

    announce(
      `${wP.name} wins the match ${state.scores[winner]} to ${state.scores[loser]}! ` +
      `${lP.name} does the chores.`
    );

    launchConfetti([wP.color1, wP.color2]);

    await sleep(CONFETTI_DURATION + 400);
  }

  function hideWinnerBanner() {
    els.winnerBanner.classList.remove('is-visible');
    els.winnerBanner.setAttribute('aria-hidden', 'true');
  }

  // =========================================================
  // INIT
  // =========================================================
  function init() {
    sizeCanvas();
    els.playBtn.addEventListener('click', onPlayClick);

    // Start the coin showing heads
    els.coin.style.transform = 'rotateX(0deg)';

    announce('Ready. Press Flip to start a best-of-three coin flip match. Madi is heads, Hunter is tails.');
  }

  init();
  </script>
</body>
</html>
