<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffe4ec" />
  <title>Madi and Hunter Chore Game!</title>

  <!-- Google Fonts: Bungee (display shout-lettering) + Fredoka (rounded body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bungee&family=Fredoka:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    /* =========================================================
       DESIGN TOKENS
       Playful / Toy-like aesthetic. One dominant tone (warm cream),
       two character accents (Madi pink/purple, Hunter blue/teal),
       one neutral ink. Soft shadows are tinted, not generic gray.
       ========================================================= */
    :root {
      --madi-1: #ff6bcb;
      --madi-2: #a855f7;
      --hunter-1: #3b82f6;
      --hunter-2: #14b8a6;

      --bg-1: #fff5e6;
      --bg-2: #ffe4ec;
      --bg-3: #e0f2fe;

      --ink: #1f1235;
      --ink-soft: #5a4a74;
      --paper: #ffffff;

      --gold: #fcd34d;
      --gold-glow: #fbbf24;

      --shadow-madi: 0 20px 40px -18px rgba(168, 85, 247, 0.55),
                     0 6px 12px -6px rgba(255, 107, 203, 0.35);
      --shadow-hunter: 0 20px 40px -18px rgba(59, 130, 246, 0.55),
                       0 6px 12px -6px rgba(20, 184, 166, 0.35);
      --shadow-card: 0 18px 40px -20px rgba(31, 18, 53, 0.35);

      --radius-lg: 28px;
      --radius-md: 18px;
      --radius-pill: 999px;

      --ease-pop: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-swift: cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* =========================================================
       RESET + BASE
       ========================================================= */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
    button:focus-visible {
      outline: 3px solid var(--ink);
      outline-offset: 4px;
      border-radius: var(--radius-pill);
    }

    body {
      font-family: 'Fredoka', system-ui, sans-serif;
      font-weight: 500;
      color: var(--ink);
      background:
        radial-gradient(1200px 700px at 10% 0%, var(--bg-2) 0%, transparent 60%),
        radial-gradient(1000px 600px at 100% 100%, var(--bg-3) 0%, transparent 55%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 60%, var(--bg-3) 100%);
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* Subtle noise texture overlay to add tactile "paper" depth.
       Generated inline as an SVG data-URI so no external asset. */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
      mix-blend-mode: multiply;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.12  0 0 0 0 0.08  0 0 0 0 0.20  0 0 0 0.05 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    }

    /* ---------- BACK TO MENU PILL LINK ---------- */
    .back-link {
      position: relative;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: clamp(14px, 2.5vw, 22px) 0 0 clamp(16px, 4vw, 40px);
      padding: 10px 18px;
      font-family: 'Fredoka', system-ui, sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--ink-soft);
      background: var(--paper);
      border-radius: var(--radius-pill);
      text-decoration: none;
      box-shadow: 0 6px 16px -8px rgba(31, 18, 53, 0.25);
      transition: transform 180ms var(--ease-pop), box-shadow 180ms ease, color 180ms ease;
      width: max-content;
    }
    .back-link:hover {
      transform: translateY(-2px);
      color: var(--ink);
      box-shadow: 0 10px 22px -8px rgba(31, 18, 53, 0.32);
    }
    .back-link:focus-visible {
      outline: 3px solid var(--ink);
      outline-offset: 4px;
    }
    .back-link__arrow {
      font-family: 'Bungee', sans-serif;
      transition: transform 180ms var(--ease-pop);
    }
    .back-link:hover .back-link__arrow { transform: translateX(-3px); }

    /* =========================================================
       LAYOUT
       ========================================================= */
    .app {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: clamp(20px, 4vw, 48px) clamp(16px, 4vw, 40px) 60px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      gap: clamp(20px, 3.5vw, 36px);
    }

    /* ---------- TITLE ---------- */
    .title-wrap {
      text-align: center;
      padding-top: 8px;
    }
    .title {
      font-family: 'Bungee', 'Fredoka', sans-serif;
      font-weight: 400;
      font-size: clamp(2rem, 7.5vw, 4.75rem);
      line-height: 1.02;
      letter-spacing: 0.005em;
      margin: 0;
      background: linear-gradient(90deg, var(--madi-1) 0%, var(--madi-2) 35%, var(--hunter-1) 65%, var(--hunter-2) 100%);
      -webkit-background-clip: text;
              background-clip: text;
      color: transparent;
      text-shadow: 0 6px 0 rgba(31, 18, 53, 0.08);
      animation: title-wiggle 4.2s ease-in-out infinite;
      transform-origin: center bottom;
      padding: 0 6px;
    }
    .subtitle {
      margin: 8px 0 0;
      font-size: clamp(0.95rem, 1.6vw, 1.15rem);
      color: var(--ink-soft);
      font-weight: 500;
    }
    @keyframes title-wiggle {
      0%, 100% { transform: rotate(-1.2deg) translateY(0); }
      50%      { transform: rotate(1.2deg) translateY(-4px); }
    }

    /* ---------- PLAYER CARDS + ARENA ---------- */
    .board {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: stretch;
      gap: clamp(12px, 2.5vw, 28px);
    }

    .player {
      position: relative;
      background: var(--paper);
      border-radius: var(--radius-lg);
      padding: clamp(18px, 2.4vw, 26px);
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: transform 300ms var(--ease-pop), box-shadow 300ms var(--ease-swift);
    }
    /* Asymmetric card tilt — breaks the grid intentionally */
    .player--madi   { transform: rotate(-1.2deg); box-shadow: var(--shadow-madi), var(--shadow-card); }
    .player--hunter { transform: rotate(1.2deg);  box-shadow: var(--shadow-hunter), var(--shadow-card); }
    .player--madi.is-winning-round   { transform: rotate(-1.2deg) translateY(-4px) scale(1.02); }
    .player--hunter.is-winning-round { transform: rotate(1.2deg)  translateY(-4px) scale(1.02); }

    .player::before {
      /* Color stripe at the top — subtle flag of identity */
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 8px;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      background: linear-gradient(90deg, var(--c1), var(--c2));
    }
    .player--madi   { --c1: var(--madi-1);   --c2: var(--madi-2); }
    .player--hunter { --c1: var(--hunter-1); --c2: var(--hunter-2); }

    .player__header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 6px;
    }
    .player__avatar {
      width: clamp(54px, 8vw, 72px);
      height: clamp(54px, 8vw, 72px);
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: clamp(2rem, 4.5vw, 2.6rem);
      background: linear-gradient(135deg, var(--c1), var(--c2));
      box-shadow: 0 10px 20px -10px rgba(0,0,0,0.25), inset 0 -4px 0 rgba(0,0,0,0.12);
      flex: 0 0 auto;
    }
    .player__name {
      font-family: 'Bungee', 'Fredoka', sans-serif;
      font-size: clamp(1.4rem, 3vw, 2rem);
      line-height: 1;
      background: linear-gradient(90deg, var(--c1), var(--c2));
      -webkit-background-clip: text;
              background-clip: text;
      color: transparent;
    }

    .player__scorerow {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
    }
    .player__scorelabel {
      font-size: 0.85rem;
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 600;
    }
    .pips {
      display: flex;
      gap: 10px;
      margin-left: auto;
    }
    .pip {
      width: clamp(22px, 3.2vw, 28px);
      height: clamp(22px, 3.2vw, 28px);
      border-radius: 50%;
      background: #f3eef8;
      box-shadow: inset 0 2px 4px rgba(31,18,53,0.14);
      position: relative;
      transition: transform 300ms var(--ease-pop);
    }
    .pip.is-filled {
      background: linear-gradient(135deg, var(--c1), var(--c2));
      box-shadow: 0 6px 14px -4px rgba(0,0,0,0.25), inset 0 -3px 0 rgba(0,0,0,0.15);
      animation: pip-pop 600ms var(--ease-pop);
    }
    .pip.is-filled::after {
      /* Sparkle on filled pip */
      content: "✦";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 0.85rem;
      opacity: 0;
      animation: sparkle 900ms var(--ease-swift) forwards;
    }
    @keyframes pip-pop {
      0%   { transform: scale(0.3); }
      60%  { transform: scale(1.35); }
      100% { transform: scale(1); }
    }
    @keyframes sparkle {
      0%   { opacity: 0; transform: scale(0.4) rotate(-40deg); }
      40%  { opacity: 1; transform: scale(1.2) rotate(10deg); }
      100% { opacity: 0.85; transform: scale(1) rotate(0); }
    }

    /* ---------- HAND STAGE (inside each player card) ---------- */
    .hand-stage {
      margin-top: auto;
      height: clamp(110px, 16vw, 150px);
      display: grid;
      place-items: center;
      background:
        radial-gradient(60% 80% at 50% 40%, rgba(255,255,255,0.9) 0%, transparent 70%),
        linear-gradient(180deg, rgba(255,255,255,0.6), rgba(255,255,255,0.2));
      border-radius: var(--radius-md);
      border: 2px dashed rgba(31,18,53,0.08);
      overflow: hidden;
      position: relative;
    }
    .hand {
      font-size: clamp(3.8rem, 9vw, 5.2rem);
      line-height: 1;
      filter: drop-shadow(0 10px 10px rgba(31,18,53,0.18));
      transition: transform 300ms var(--ease-pop), filter 300ms var(--ease-swift), opacity 300ms ease;
      will-change: transform;
      user-select: none;
    }
    .hand.is-shaking {
      animation: hand-shake 550ms ease-in-out;
    }
    .hand.is-winner {
      transform: scale(1.2);
      filter: drop-shadow(0 0 22px var(--gold-glow)) drop-shadow(0 0 8px var(--gold));
      animation: winner-pulse 900ms var(--ease-pop);
    }
    .hand.is-loser {
      transform: scale(0.78);
      filter: grayscale(60%) brightness(0.9);
      opacity: 0.7;
    }
    @keyframes hand-shake {
      0%   { transform: translateY(0) rotate(0deg); }
      20%  { transform: translateY(-22px) rotate(-8deg); }
      50%  { transform: translateY(0) rotate(0deg); }
      80%  { transform: translateY(-14px) rotate(6deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }
    @keyframes winner-pulse {
      0%   { transform: scale(0.9); }
      50%  { transform: scale(1.35); }
      100% { transform: scale(1.2); }
    }

    /* ---------- CENTER ARENA (VS / round status) ---------- */
    .arena {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: clamp(80px, 10vw, 140px);
      gap: 12px;
      padding: 10px 6px;
    }
    .vs-badge {
      font-family: 'Bungee', sans-serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      background: var(--ink);
      color: var(--bg-1);
      padding: 10px 18px;
      border-radius: var(--radius-pill);
      box-shadow: 0 10px 22px -10px rgba(31,18,53,0.55), inset 0 -4px 0 rgba(0,0,0,0.25);
      transform: rotate(-4deg);
      letter-spacing: 0.04em;
    }
    .round-indicator {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--ink-soft);
      font-weight: 600;
      text-align: center;
    }
    .round-indicator strong {
      display: block;
      font-family: 'Bungee', sans-serif;
      font-size: clamp(1.1rem, 2.2vw, 1.4rem);
      color: var(--ink);
      letter-spacing: 0.04em;
      margin-top: 2px;
    }

    /* ---------- COUNTDOWN OVERLAY ---------- */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      pointer-events: none;
      background: radial-gradient(circle at 50% 50%, rgba(31,18,53,0.18), transparent 60%);
      opacity: 0;
      transition: opacity 220ms ease;
    }
    .overlay.is-visible { opacity: 1; }
    .overlay__text {
      font-family: 'Bungee', sans-serif;
      font-size: clamp(3rem, 14vw, 10rem);
      line-height: 1;
      text-align: center;
      padding: 0 20px;
      color: var(--ink);
      text-shadow:
        6px 6px 0 var(--gold),
        12px 12px 0 rgba(31,18,53,0.15);
      animation: countdown-pulse 550ms var(--ease-pop);
      letter-spacing: 0.02em;
    }
    .overlay__text--shoot {
      background: linear-gradient(90deg, var(--madi-1), var(--madi-2), var(--hunter-1), var(--hunter-2));
      -webkit-background-clip: text;
              background-clip: text;
      color: transparent;
      text-shadow: 6px 6px 0 rgba(31,18,53,0.2);
    }
    .overlay__text--tie {
      font-size: clamp(2rem, 7vw, 4.5rem);
      color: var(--ink);
      background: var(--gold);
      padding: 14px 28px;
      border-radius: var(--radius-pill);
      text-shadow: none;
      box-shadow: 0 18px 40px -10px rgba(251,191,36,0.6);
    }
    @keyframes countdown-pulse {
      0%   { transform: scale(0.6); opacity: 0; }
      40%  { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ---------- WINNER BANNER ---------- */
    .winner-banner {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: grid;
      place-items: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 300ms ease;
      padding: 20px;
    }
    .winner-banner.is-visible { opacity: 1; }
    .winner-banner__card {
      background: var(--paper);
      border-radius: var(--radius-lg);
      padding: clamp(24px, 4vw, 44px) clamp(28px, 5vw, 60px);
      text-align: center;
      box-shadow: 0 40px 80px -30px rgba(31,18,53,0.4);
      transform: scale(0.7) rotate(-3deg);
      transition: transform 600ms var(--ease-pop);
      max-width: min(90vw, 640px);
      border-top: 12px solid var(--winner-c1, var(--gold));
    }
    .winner-banner.is-visible .winner-banner__card {
      transform: scale(1) rotate(-1deg);
    }
    .winner-banner__headline {
      font-family: 'Bungee', sans-serif;
      font-size: clamp(2.2rem, 7vw, 4.5rem);
      line-height: 1;
      margin: 0 0 10px;
      background: linear-gradient(90deg, var(--winner-c1, var(--madi-1)), var(--winner-c2, var(--madi-2)));
      -webkit-background-clip: text;
              background-clip: text;
      color: transparent;
      letter-spacing: 0.02em;
    }
    .winner-banner__chore {
      font-size: clamp(1.1rem, 2.4vw, 1.5rem);
      color: var(--ink);
      margin: 8px 0 0;
      font-weight: 600;
    }
    .winner-banner__chore .emoji {
      display: inline-block;
      margin-left: 6px;
      animation: broom-sweep 1.8s ease-in-out infinite;
      transform-origin: 70% 70%;
    }
    @keyframes broom-sweep {
      0%, 100% { transform: rotate(-14deg); }
      50%      { transform: rotate(14deg); }
    }

    /* ---------- PLAY BUTTON ---------- */
    .play-wrap {
      display: grid;
      place-items: center;
      margin-top: clamp(12px, 2vw, 24px);
    }
    .play-btn {
      font-family: 'Bungee', sans-serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      padding: clamp(18px, 2.4vw, 24px) clamp(40px, 7vw, 68px);
      color: var(--paper);
      background: linear-gradient(135deg, var(--madi-1) 0%, var(--madi-2) 50%, var(--hunter-1) 100%);
      border-radius: var(--radius-pill);
      box-shadow:
        0 18px 36px -10px rgba(168,85,247,0.55),
        0 6px 0 rgba(31,18,53,0.2),
        inset 0 -6px 0 rgba(0,0,0,0.15);
      letter-spacing: 0.06em;
      transform: translateY(0);
      transition: transform 180ms var(--ease-pop), box-shadow 180ms ease, filter 180ms ease;
      min-height: 56px;
      min-width: 180px;
      position: relative;
    }
    .play-btn:not(:disabled):hover { transform: translateY(-3px) scale(1.02); }
    .play-btn:not(:disabled):active { transform: translateY(2px) scale(0.99); }
    .play-btn:disabled {
      filter: saturate(0.5) brightness(0.95);
      cursor: not-allowed;
      opacity: 0.75;
    }
    .play-btn__pulse {
      position: absolute;
      inset: 0;
      border-radius: var(--radius-pill);
      box-shadow: 0 0 0 0 rgba(168,85,247,0.55);
      animation: btn-pulse 2.2s ease-out infinite;
      pointer-events: none;
    }
    .play-btn:disabled .play-btn__pulse { animation: none; box-shadow: none; }
    @keyframes btn-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(168,85,247,0.5); }
      70%  { box-shadow: 0 0 0 24px rgba(168,85,247,0); }
      100% { box-shadow: 0 0 0 0 rgba(168,85,247,0); }
    }

    /* ---------- CONFETTI CANVAS ---------- */
    #confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 55;
    }

    /* ---------- ACCESSIBILITY: SR-ONLY LIVE REGION ---------- */
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    /* ---------- FOOTER HINT ---------- */
    .hint {
      text-align: center;
      color: var(--ink-soft);
      font-size: 0.9rem;
      margin-top: 8px;
    }

    /* =========================================================
       RESPONSIVE: STACK CARDS ON NARROW SCREENS
       ========================================================= */
    @media (max-width: 720px) {
      .board {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
      }
      .arena {
        order: 2;
        flex-direction: row;
        padding: 4px;
      }
      .player--madi   { order: 1; transform: rotate(-0.6deg); }
      .player--hunter { order: 3; transform: rotate(0.6deg); }
      .player--madi.is-winning-round   { transform: rotate(-0.6deg) translateY(-3px) scale(1.01); }
      .player--hunter.is-winning-round { transform: rotate(0.6deg)  translateY(-3px) scale(1.01); }
      .vs-badge { transform: rotate(0deg); }
    }

    /* Reduced motion: disable decorative animations */
    @media (prefers-reduced-motion: reduce) {
      .title,
      .winner-banner__chore .emoji,
      .play-btn__pulse { animation: none !important; }
      .hand.is-shaking,
      .pip.is-filled,
      .overlay__text { animation-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <!-- Back to menu link -->
  <a class="back-link" href="/" aria-label="Back to games menu">
    <span class="back-link__arrow" aria-hidden="true">&larr;</span>
    <span>Back to Games</span>
  </a>

  <main class="app" role="main">
    <!-- TITLE -->
    <header class="title-wrap">
      <h1 class="title" aria-label="Madi and Hunter Chore Game!">Madi and Hunter<br />Chore Game!</h1>
      <p class="subtitle">Best of 3 — winner is chore-free!</p>
    </header>

    <!-- BOARD: Madi card | VS | Hunter card -->
    <section class="board" aria-label="Match board">
      <!-- MADI -->
      <article class="player player--madi" id="card-madi" aria-labelledby="madi-name">
        <header class="player__header">
          <div class="player__avatar" aria-hidden="true">👧</div>
          <h2 class="player__name" id="madi-name">Madi</h2>
        </header>
        <div class="player__scorerow">
          <span class="player__scorelabel">Score</span>
          <div class="pips" role="status" aria-label="Madi's wins">
            <div class="pip" data-player="madi" data-index="0"></div>
            <div class="pip" data-player="madi" data-index="1"></div>
          </div>
        </div>
        <div class="hand-stage">
          <div class="hand" id="hand-madi" aria-hidden="true">✊</div>
        </div>
      </article>

      <!-- ARENA -->
      <div class="arena" aria-hidden="true">
        <div class="vs-badge">VS</div>
        <div class="round-indicator">
          Round
          <strong id="round-number">1</strong>
        </div>
      </div>

      <!-- HUNTER -->
      <article class="player player--hunter" id="card-hunter" aria-labelledby="hunter-name">
        <header class="player__header">
          <div class="player__avatar" aria-hidden="true">👦</div>
          <h2 class="player__name" id="hunter-name">Hunter</h2>
        </header>
        <div class="player__scorerow">
          <span class="player__scorelabel">Score</span>
          <div class="pips" role="status" aria-label="Hunter's wins">
            <div class="pip" data-player="hunter" data-index="0"></div>
            <div class="pip" data-player="hunter" data-index="1"></div>
          </div>
        </div>
        <div class="hand-stage">
          <div class="hand" id="hand-hunter" aria-hidden="true">✊</div>
        </div>
      </article>
    </section>

    <!-- PLAY BUTTON -->
    <div class="play-wrap">
      <button id="playBtn" class="play-btn" type="button" aria-label="Play match">
        <span class="play-btn__pulse" aria-hidden="true"></span>
        <span id="playBtnLabel">PLAY!</span>
      </button>
    </div>
    <p class="hint">Press Enter or Space on the button to play.</p>

    <!-- Live region for screen readers -->
    <div id="announcer" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>
  </main>

  <!-- Countdown overlay -->
  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="overlay__text" id="overlayText">ROCK</div>
  </div>

  <!-- Winner banner -->
  <div class="winner-banner" id="winnerBanner" aria-hidden="true">
    <div class="winner-banner__card" id="winnerCard">
      <h2 class="winner-banner__headline" id="winnerHeadline">MADI WINS!</h2>
      <p class="winner-banner__chore" id="winnerChore">
        Hunter does the chores! <span class="emoji" aria-hidden="true">🧹</span>
      </p>
    </div>
  </div>

  <!-- Confetti canvas -->
  <canvas id="confetti" aria-hidden="true"></canvas>

  <script>
  // =========================================================
  // CONSTANTS
  // =========================================================
  const MOVES = ['rock', 'paper', 'scissors'];
  const MOVE_EMOJI = { rock: '✊', paper: '✋', scissors: '✌️' };
  const WINS_TO_END = 2;             // Best of 3 = first to 2
  const COUNTDOWN_STEP_MS = 550;     // Each countdown word
  const REVEAL_PAUSE_MS   = 1000;    // Pause on reveal before next round
  const TIE_PAUSE_MS      = 900;     // Show "TIE" banner briefly
  const CONFETTI_DURATION = 3000;    // 3s confetti

  const PLAYERS = {
    madi:   { name: 'Madi',   color1: '#ff6bcb', color2: '#a855f7' },
    hunter: { name: 'Hunter', color1: '#3b82f6', color2: '#14b8a6' }
  };

  // =========================================================
  // STATE MACHINE
  // States: IDLE → COUNTDOWN → REVEAL → SCORE → (NEXT_ROUND | MATCH_END) → IDLE
  // =========================================================
  const state = {
    phase: 'IDLE',
    scores: { madi: 0, hunter: 0 },
    round: 1,          // 1-based, only increments on a decisive round
    busy: false
  };

  // =========================================================
  // DOM REFS
  // =========================================================
  const els = {
    playBtn:       document.getElementById('playBtn'),
    playBtnLabel:  document.getElementById('playBtnLabel'),
    handMadi:      document.getElementById('hand-madi'),
    handHunter:    document.getElementById('hand-hunter'),
    cardMadi:      document.getElementById('card-madi'),
    cardHunter:    document.getElementById('card-hunter'),
    roundNumber:   document.getElementById('round-number'),
    overlay:       document.getElementById('overlay'),
    overlayText:   document.getElementById('overlayText'),
    winnerBanner:  document.getElementById('winnerBanner'),
    winnerCard:    document.getElementById('winnerCard'),
    winnerHeadline:document.getElementById('winnerHeadline'),
    winnerChore:   document.getElementById('winnerChore'),
    announcer:     document.getElementById('announcer'),
    canvas:        document.getElementById('confetti')
  };
  const pips = Array.from(document.querySelectorAll('.pip'));

  // =========================================================
  // UTIL
  // =========================================================
  const sleep = (ms) => new Promise(r => setTimeout(r, ms));
  const announce = (msg) => { els.announcer.textContent = msg; };

  // =========================================================
  // RNG / GAME LOGIC  (fairness critical — no rigging)
  // Each round:
  //   - Call Math.random() TWICE, independently (once per player).
  //   - Map value < 1/3 → rock, < 2/3 → paper, else → scissors.
  //   - Ties replay the round without awarding a point or incrementing round counter.
  // =========================================================
  function pickMove() {
    const r = Math.random();          // Fresh independent draw per call
    if (r < 1 / 3) return 'rock';
    if (r < 2 / 3) return 'paper';
    return 'scissors';
  }

  function decideRound(moveA, moveB) {
    if (moveA === moveB) return 'tie';
    const beats = { rock: 'scissors', paper: 'rock', scissors: 'paper' };
    return beats[moveA] === moveB ? 'a' : 'b';
  }

  // =========================================================
  // RENDER
  // =========================================================
  function renderScores() {
    pips.forEach(pip => {
      const who = pip.dataset.player;
      const idx = Number(pip.dataset.index);
      const filled = state.scores[who] > idx;
      // Only toggle when state changes, so pop animation replays cleanly
      if (filled && !pip.classList.contains('is-filled')) {
        pip.classList.add('is-filled');
      } else if (!filled && pip.classList.contains('is-filled')) {
        pip.classList.remove('is-filled');
      }
    });
  }

  function renderRound() {
    els.roundNumber.textContent = String(state.round);
  }

  function setHand(who, move) {
    const el = who === 'madi' ? els.handMadi : els.handHunter;
    el.textContent = MOVE_EMOJI[move];
  }

  function resetHandsVisual() {
    [els.handMadi, els.handHunter].forEach(h => {
      h.classList.remove('is-winner', 'is-loser', 'is-shaking');
    });
    [els.cardMadi, els.cardHunter].forEach(c => c.classList.remove('is-winning-round'));
  }

  // =========================================================
  // ANIMATION HELPERS
  // =========================================================
  function showOverlay(text, variant) {
    els.overlayText.className = 'overlay__text' + (variant ? ' overlay__text--' + variant : '');
    els.overlayText.textContent = text;
    // Retrigger animation
    els.overlayText.style.animation = 'none';
    // Force reflow so animation restarts
    void els.overlayText.offsetWidth;
    els.overlayText.style.animation = '';
    els.overlay.classList.add('is-visible');
    els.overlay.setAttribute('aria-hidden', 'false');
  }
  function hideOverlay() {
    els.overlay.classList.remove('is-visible');
    els.overlay.setAttribute('aria-hidden', 'true');
  }

  function shakeHands() {
    [els.handMadi, els.handHunter].forEach(h => {
      h.classList.remove('is-shaking');
      void h.offsetWidth;             // restart animation
      h.classList.add('is-shaking');
    });
  }

  // =========================================================
  // CONFETTI (canvas 2D, ~150 pieces, ~3s)
  // =========================================================
  const confettiCtx = els.canvas.getContext('2d');
  let confettiRAF = null;
  let confettiPieces = [];

  function sizeCanvas() {
    els.canvas.width  = window.innerWidth  * devicePixelRatio;
    els.canvas.height = window.innerHeight * devicePixelRatio;
    els.canvas.style.width  = window.innerWidth  + 'px';
    els.canvas.style.height = window.innerHeight + 'px';
    confettiCtx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }
  window.addEventListener('resize', sizeCanvas);

  function launchConfetti(primaryColors) {
    sizeCanvas();
    const palette = primaryColors.concat(['#fcd34d', '#ffffff', '#1f1235']);
    const w = window.innerWidth;
    confettiPieces = [];
    for (let i = 0; i < 150; i++) {
      confettiPieces.push({
        x: Math.random() * w,
        y: -20 - Math.random() * 200,
        vx: (Math.random() - 0.5) * 2.2,
        vy: 2 + Math.random() * 4,
        size: 6 + Math.random() * 8,
        rot: Math.random() * Math.PI * 2,
        vr: (Math.random() - 0.5) * 0.25,
        color: palette[Math.floor(Math.random() * palette.length)]
      });
    }
    const startTs = performance.now();
    cancelAnimationFrame(confettiRAF);

    function frame(now) {
      const elapsed = now - startTs;
      const h = window.innerHeight;
      confettiCtx.clearRect(0, 0, window.innerWidth, h);
      const fading = elapsed > CONFETTI_DURATION - 600;
      const alpha = fading ? Math.max(0, 1 - (elapsed - (CONFETTI_DURATION - 600)) / 600) : 1;
      confettiCtx.globalAlpha = alpha;

      confettiPieces.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.06;          // gravity
        p.rot += p.vr;
        confettiCtx.save();
        confettiCtx.translate(p.x, p.y);
        confettiCtx.rotate(p.rot);
        confettiCtx.fillStyle = p.color;
        confettiCtx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
        confettiCtx.restore();
      });
      confettiCtx.globalAlpha = 1;

      if (elapsed < CONFETTI_DURATION) {
        confettiRAF = requestAnimationFrame(frame);
      } else {
        confettiCtx.clearRect(0, 0, window.innerWidth, h);
      }
    }
    confettiRAF = requestAnimationFrame(frame);
  }

  // =========================================================
  // EVENT HANDLERS
  // =========================================================
  async function onPlayClick() {
    if (state.busy) return;
    await runMatch();
  }

  // =========================================================
  // MATCH FLOW (state machine)
  // =========================================================
  async function runMatch() {
    // --- Reset for a new match ---
    state.busy = true;
    state.scores = { madi: 0, hunter: 0 };
    state.round = 1;
    els.playBtn.disabled = true;
    els.playBtn.setAttribute('aria-busy', 'true');
    hideWinnerBanner();
    renderScores();
    renderRound();
    resetHandsVisual();
    setHand('madi', 'rock');
    setHand('hunter', 'rock');

    // --- Play rounds until someone reaches WINS_TO_END ---
    while (state.scores.madi < WINS_TO_END && state.scores.hunter < WINS_TO_END) {
      // A round may "tie and replay" — loop until decisive
      let decisive = false;
      while (!decisive) {
        decisive = await playOneRound();
      }
      // Only increment round counter when decisive
      if (state.scores.madi < WINS_TO_END && state.scores.hunter < WINS_TO_END) {
        state.round += 1;
        renderRound();
      }
    }

    // --- Match end ---
    const winner = state.scores.madi >= WINS_TO_END ? 'madi' : 'hunter';
    const loser  = winner === 'madi' ? 'hunter' : 'madi';
    await showMatchEnd(winner, loser);

    // --- Re-enable button ---
    els.playBtn.disabled = false;
    els.playBtn.removeAttribute('aria-busy');
    els.playBtnLabel.textContent = 'Play Again!';
    state.busy = false;
    state.phase = 'IDLE';
  }

  // Returns true if round was decisive (point awarded), false if it was a tie (replay).
  async function playOneRound() {
    state.phase = 'COUNTDOWN';
    resetHandsVisual();

    // --- Independent RNG rolls for each player ---
    const madiMove   = pickMove();     // First random draw
    const hunterMove = pickMove();     // Second independent random draw

    // Keep hands as "rock" during shake; reveal on SHOOT
    setHand('madi', 'rock');
    setHand('hunter', 'rock');

    // --- Countdown sequence: ROCK, PAPER, SCISSORS, SHOOT! ---
    const steps = ['ROCK', 'PAPER', 'SCISSORS'];
    for (const word of steps) {
      showOverlay(word);
      shakeHands();
      await sleep(COUNTDOWN_STEP_MS);
    }
    showOverlay('SHOOT!', 'shoot');
    await sleep(260);

    // --- Reveal ---
    state.phase = 'REVEAL';
    setHand('madi', madiMove);
    setHand('hunter', hunterMove);
    hideOverlay();

    const outcome = decideRound(madiMove, hunterMove);

    // --- Tie: announce, pause, replay (no point, no round count) ---
    if (outcome === 'tie') {
      announce(`Tie! Both played ${madiMove}. Replaying round.`);
      showOverlay('TIE! Replay…', 'tie');
      await sleep(TIE_PAUSE_MS);
      hideOverlay();
      await sleep(200);
      return false; // not decisive
    }

    // --- Decisive: award point, highlight winner ---
    state.phase = 'SCORE';
    const winner = outcome === 'a' ? 'madi' : 'hunter';
    const loser  = winner === 'madi' ? 'hunter' : 'madi';

    (winner === 'madi' ? els.handMadi : els.handHunter).classList.add('is-winner');
    (loser  === 'madi' ? els.handMadi : els.handHunter).classList.add('is-loser');
    (winner === 'madi' ? els.cardMadi : els.cardHunter).classList.add('is-winning-round');

    state.scores[winner] += 1;
    renderScores();

    announce(
      `Round ${state.round}: ${PLAYERS[winner].name} played ${winner === 'madi' ? madiMove : hunterMove}, ` +
      `${PLAYERS[loser].name} played ${loser === 'madi' ? madiMove : hunterMove}. ` +
      `${PLAYERS[winner].name} wins the round. ` +
      `Score: Madi ${state.scores.madi}, Hunter ${state.scores.hunter}.`
    );

    await sleep(REVEAL_PAUSE_MS);
    return true; // decisive
  }

  async function showMatchEnd(winner, loser) {
    state.phase = 'MATCH_END';
    const wP = PLAYERS[winner];
    const lP = PLAYERS[loser];

    els.winnerHeadline.textContent = `${wP.name.toUpperCase()} WINS!`;
    els.winnerChore.innerHTML =
      `${lP.name} does the chores! <span class="emoji" aria-hidden="true">🧹</span>`;
    els.winnerCard.style.setProperty('--winner-c1', wP.color1);
    els.winnerCard.style.setProperty('--winner-c2', wP.color2);
    els.winnerCard.style.borderTopColor = wP.color1;

    els.winnerBanner.classList.add('is-visible');
    els.winnerBanner.setAttribute('aria-hidden', 'false');

    announce(
      `${wP.name} wins the match ${state.scores[winner]} to ${state.scores[loser]}! ` +
      `${lP.name} does the chores.`
    );

    launchConfetti([wP.color1, wP.color2]);

    // Keep banner up for a satisfying beat
    await sleep(CONFETTI_DURATION + 400);
  }

  function hideWinnerBanner() {
    els.winnerBanner.classList.remove('is-visible');
    els.winnerBanner.setAttribute('aria-hidden', 'true');
  }

  // =========================================================
  // INIT
  // =========================================================
  function init() {
    sizeCanvas();
    els.playBtn.addEventListener('click', onPlayClick);
    // Note: native <button> already handles Enter/Space → click, so no extra keydown wiring needed.

    // Initial accessibility announcement
    announce('Ready. Press Play to start a best-of-three rock paper scissors match between Madi and Hunter.');
  }

  // Start when DOM is parsed (script is at end of body, so it's safe to call now)
  init();
  </script>
</body>
</html>
